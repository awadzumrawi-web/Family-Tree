<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شجرة عائلة آل عثمان نارتي</title>
<style>
  :root{
    --paper:#F1E9D9;
    --paper-2:#FCF8EF;
    --ink:#2A2118;
    --muted:#8A7B63;
    --line:#E0D4BC;
    --gold:#B58A2E;
    --gold-soft:#E6D2A2;

    --g0:#6E1A2E; /* الجد - مارون */
    --g1:#1F5C5A; /* أزرق مخضر */
    --g2:#B5651D; /* طيني */
    --g3:#4F5D2F; /* زيتوني */
    --g4:#5B4B8A; /* بنفسجي هادئ */
    --g5:#8A6D3B; /* برونزي */

    --font-display:"Noto Naskh Arabic","Amiri","Scheherazade New","Times New Roman",serif;
    --font-body:"Segoe UI","Tahoma","Geeza Pro","Noto Sans Arabic","Arial",sans-serif;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--font-body);
    color:var(--ink);
    background:
      radial-gradient(1200px 500px at 80% -10%, #FBF4E3 0%, transparent 60%),
      var(--paper);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Header ---------- */
  header.top{
    text-align:center;
    padding:2.4rem 1rem 1.2rem;
    background:
      linear-gradient(180deg, rgba(110,26,46,.06), transparent 70%);
    border-bottom:1px solid var(--line);
  }
  .eyebrow{
    font-size:.72rem;letter-spacing:.35em;text-transform:uppercase;
    color:var(--gold);font-weight:700;margin-bottom:.6rem;
  }
  header.top h1{
    font-family:var(--font-display);
    font-size:clamp(1.7rem,5vw,2.9rem);
    margin:0;color:var(--g0);font-weight:700;
    line-height:1.2;
  }
  header.top .sub{color:var(--muted);margin-top:.5rem;font-size:.95rem}
  .stats{
    display:flex;justify-content:center;gap:.6rem;flex-wrap:wrap;
    margin-top:1.1rem;
  }
  .stat{
    background:var(--paper-2);border:1px solid var(--line);
    border-radius:999px;padding:.35rem .9rem;font-size:.82rem;color:var(--muted);
  }
  .stat b{color:var(--ink);font-weight:700}

  /* ---------- Toolbar ---------- */
  .toolbar{
    position:sticky;top:0;z-index:20;
    display:flex;gap:.6rem;flex-wrap:wrap;align-items:center;justify-content:center;
    padding:.7rem 1rem;
    background:rgba(241,233,217,.92);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);
  }
  .search{
    flex:1 1 240px;max-width:360px;position:relative;
  }
  .search input{
    width:100%;font-family:var(--font-body);font-size:.95rem;
    padding:.55rem .9rem .55rem 2.2rem;
    border:1px solid var(--line);border-radius:999px;background:var(--paper-2);
    color:var(--ink);outline:none;
  }
  .search input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft)}
  .search .ic{position:absolute;left:.8rem;top:50%;transform:translateY(-50%);color:var(--muted)}
  .btn{
    font-family:var(--font-body);font-size:.85rem;cursor:pointer;
    padding:.5rem .9rem;border-radius:999px;border:1px solid var(--line);
    background:var(--paper-2);color:var(--ink);transition:.15s;
  }
  .btn:hover{border-color:var(--gold);color:var(--g0)}
  .btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}

  /* ---------- Legend ---------- */
  .legend{
    display:flex;gap:.7rem 1.1rem;flex-wrap:wrap;justify-content:center;
    padding:.8rem 1rem;color:var(--muted);font-size:.78rem;
  }
  .legend span{display:inline-flex;align-items:center;gap:.4rem}
  .dot{width:.7rem;height:.7rem;border-radius:50%;display:inline-block}
  .tag-mini{
    font-size:.66rem;border-radius:4px;padding:.05rem .35rem;border:1px solid currentColor;
  }

  /* ---------- Tree ---------- */
  main{padding:1.2rem 1rem 4rem;overflow-x:auto}
  .tree-wrap{min-width:max-content;margin:0 auto}

  /* root medallion */
  .root-medallion{
    display:flex;flex-direction:column;align-items:center;margin-bottom:.2rem;
  }
  .root-card{
    text-align:center;background:var(--paper-2);
    border:2px solid var(--g0);
    box-shadow:0 0 0 5px #fff, 0 0 0 7px var(--gold-soft), 0 10px 26px rgba(110,26,46,.18);
    border-radius:18px;padding:1rem 1.8rem;position:relative;
  }
  .root-card .name{font-family:var(--font-display);font-size:1.5rem;font-weight:700;color:var(--g0)}
  .root-card .note{color:var(--gold);font-size:.85rem;margin-top:.2rem;letter-spacing:.05em}
  .root-stem{width:2px;height:1.4rem;background:var(--gold-soft)}

  ul{list-style:none}
  ul.children{
    margin:.2rem 0 .1rem;padding-right:1.7rem;position:relative;
  }
  ul.children::before{
    content:"";position:absolute;top:-.25rem;bottom:1.65rem;right:.6rem;
    width:2px;background:var(--rail,var(--gold-soft));border-radius:2px;
  }
  ul.children.root-level{padding-right:0}
  ul.children.root-level::before{display:none}

  li.node{position:relative;padding:.16rem 0}
  ul.children > li.node::before{
    content:"";position:absolute;top:1.2rem;right:-1.1rem;width:1.1rem;height:2px;
    background:var(--rail,var(--gold-soft));
  }
  ul.children.root-level > li.node::before{display:none}

  .card-wrap{display:flex;align-items:flex-start;gap:.45rem}
  .toggle{
    flex:0 0 auto;margin-top:.55rem;width:1.35rem;height:1.35rem;border-radius:6px;
    border:1px solid var(--line);background:var(--paper-2);color:var(--muted);
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:.7rem;line-height:1;transition:.15s;padding:0;
  }
  .toggle:hover{border-color:var(--gold);color:var(--g0)}
  .toggle .car{transition:transform .18s;display:inline-block}
  li.node.collapsed > .card-wrap > .toggle .car{transform:rotate(-90deg)}
  .toggle-spacer{flex:0 0 auto;width:1.35rem}

  .card{
    background:var(--paper-2);border:1px solid var(--line);
    border-right:5px solid var(--accent,var(--gold));
    border-radius:10px;padding:.4rem .8rem;
    display:inline-flex;align-items:center;gap:.5rem;flex-wrap:wrap;
    box-shadow:0 1px 2px rgba(42,33,24,.05);transition:.15s;
  }
  li.node.has-kids > .card-wrap > .card{cursor:pointer}
  li.node.has-kids > .card-wrap > .card:hover{
    box-shadow:0 4px 12px rgba(42,33,24,.12);transform:translateY(-1px);
  }
  .card .name{font-weight:600;font-size:.97rem}
  .card.lead .name{font-family:var(--font-display);font-size:1.12rem;font-weight:700;color:var(--accent)}
  .card .note{font-size:.72rem;color:var(--muted)}
  .badge{
    font-size:.7rem;background:var(--accent,var(--gold));color:#fff;
    border-radius:999px;padding:.05rem .5rem;font-weight:700;opacity:.85;
  }
  li.node:not(.collapsed) > .card-wrap > .card > .badge{opacity:.45}
  .pill{
    font-size:.66rem;border-radius:5px;padding:.06rem .4rem;font-weight:600;
  }
  .pill.late{color:#7a5230;border:1px solid #d8b483;background:#f6ecdb}
  .pill.todo{color:#9c4221;border:1px solid #e2b09a;background:#fbeae0}

  /* marriage subheader */
  .marriage-head{
    margin:.45rem 0 .15rem;padding-right:1.7rem;font-size:.76rem;color:var(--muted);
    display:flex;align-items:center;gap:.4rem;
  }
  ul.children.root-level ~ .marriage-head{padding-right:0}
  .marriage-head .ring{color:var(--gold)}
  .spouse-chip{
    background:#fff;border:1px dashed var(--gold-soft);border-radius:999px;
    padding:.08rem .55rem;color:var(--ink);font-weight:600;
  }

  .branch{display:block}
  li.node.collapsed > .branch{display:none}

  /* search states */
  .card.match{box-shadow:0 0 0 3px var(--gold-soft),0 4px 14px rgba(181,138,46,.3);border-right-color:var(--gold)}
  .no-results{display:none;text-align:center;color:var(--muted);padding:2rem;font-size:1rem}

  footer{
    text-align:center;color:var(--muted);font-size:.78rem;
    padding:1.4rem 1rem 2.4rem;border-top:1px solid var(--line);
  }

  @media (max-width:640px){
    .card{padding:.35rem .6rem}
    .card .name{font-size:.9rem}
    ul.children{padding-right:1.35rem}
    ul.children > li.node::before{right:-.95rem;width:.95rem}
  }
  @media print{
    .toolbar,.legend{display:none}
    li.node.collapsed > .branch{display:block}
    .toggle{display:none}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>

<header class="top">
  <div class="eyebrow">شجرة النَّسَب</div>
  <h1>آل عثمان نارتي</h1>
  <div class="sub">من الجدّ عثمان سليمان حضوري — رحمه الله</div>
  <div class="stats">
    <span class="stat"><b id="stPeople">—</b> فرداً</span>
    <span class="stat"><b id="stGen">—</b> أجيال</span>
    <span class="stat"><b id="stBranch">١١</b> فرعاً رئيسياً</span>
  </div>
</header>

<div class="toolbar">
  <label class="search">
    <span class="ic">🔍</span>
    <input id="search" type="search" placeholder="ابحث عن اسم في الشجرة…" aria-label="بحث">
  </label>
  <button class="btn" id="expandAll">↧ توسيع الكل</button>
  <button class="btn" id="collapseAll">↥ طيّ الكل</button>
</div>

<div class="legend" id="legend"></div>

<main>
  <div class="tree-wrap" id="treeWrap">
    <div class="root-medallion">
      <div class="root-card">
        <div class="name">عثمان سليمان حضوري</div>
        <div class="note">آل عثمان نارتي</div>
      </div>
      <div class="root-stem"></div>
    </div>
    <div id="tree"></div>
    <div class="no-results" id="noResults">لا توجد نتائج مطابقة للبحث.</div>
  </div>
</main>

<footer>
  شجرة عائلة آل عثمان نارتي · اضغط على أي اسم لفتح أو طيّ فرعه ·
  العلامات: <b>رحمه الله</b> للمتوفّى · <b>بحاجة لتحديث</b> لما يلزم استكماله
</footer>

<script>
/* ===== بيانات الشجرة ===== */
const ROOT = {
  name:"عثمان سليمان حضوري", note:"آل عثمان نارتي", root:true,
  marriages:[{ children:[

    { name:"إبراهيم عثمان", marriages:[
      { spouse:"الزوجة الأولى", children:[
        {name:"محمد إبراهيم"},{name:"شامة إبراهيم"},{name:"جارة إبراهيم"},{name:"زينب إبراهيم"},
        {name:"سعيدة إبراهيم"},{name:"كوشي إبراهيم"},{name:"لطيفة إبراهيم"},{name:"دولة إبراهيم"}
      ]},
      { spouse:"عائشة", children:[
        {name:"فاطمة إبراهيم"},{name:"عبدالله إبراهيم"},{name:"ياسر إبراهيم"},{name:"نعيمة إبراهيم"}
      ]}
    ]},

    { name:"فرح عثمان", marriages:[{ children:[
      {name:"سعيد فرح"},{name:"فاطمة فرح"},{name:"خدم الله فرح"}
    ]}]},

    { name:"إدريس عثمان", marriages:[{ children:[
      {name:"سليمان إدريس"},{name:"عبدالحليم إدريس"},{name:"محمد إدريس"},{name:"شريفة إدريس"}
    ]}]},

    { name:"محمد عثمان «كبير»", marriages:[{ children:[
      {name:"عبدون كبير"},{name:"زينب كبير"},{name:"زكية كبير"},{name:"ليلى كبير"},
      {name:"فاطمة كبير"},{name:"عبد الواحد كبير"},{name:"أمنة كبير"}
    ]}]},

    { name:"عبدون عثمان", marriages:[{ children:[
      {name:"عبدالرحيم العال"},{name:"ستنا عبدون"},{name:"زبيدة عثمان"}
    ]}]},

    { name:"عطية عثمان", marriages:[{ children:[
      {name:"إدريس عطية"},{name:"نفيسة عطية"},{name:"الزلال عطية"},{name:"ست أبوها عطية", note:"كردا"}
    ]}]},

    { name:"حمد عثمان", marriages:[{ children:[
      {name:"عثمان حمد"},{name:"نصر حمد"},{name:"فضل حمد"},{name:"حبيبة حمد"}
    ]}]},

    { name:"عبد المجيد عثمان", marriages:[{ children:[
      {name:"فاطمة عبدالمجيد"},{name:"صفية عبدالمجيد"},{name:"علاء الدين عبد المجيد"},{name:"توفيق عبد المجيد"}
    ]}]},

    { name:"نصر عثمان", marriages:[{ children:[
      {name:"زينة نصر"},{name:"بنات نصر"},{name:"حسونة نصر"}
    ]}]},

    /* ===== فرع أوشاري عثمان (ابنة) ===== */
    { name:"أوشاري عثمان", note:"ابنة الجدّ", marriages:[{ children:[

      { name:"عبد العزيز زمراوي", marriages:[
        { spouse:"الزوجة الأولى", todo:true, children:[
          {name:"صفية عبد العزيز زمراوي", todo:true}
        ]},
        { spouse:"زينة نصر عثمان", children:[
          { name:"نفيسة عبد العزيز زمراوي", marriages:[{ spouse:"عبيد علي سليمان", children:[
            {name:"رقية"},{name:"سعاد"},{name:"علي"},{name:"عمر"},{name:"مكية"}
          ]}]},
          { name:"زكية عبد العزيز", marriages:[
            { spouse:"عبد اللطيف سعيد فلفل", children:[ {name:"محمد عبد اللطيف سعيد"} ]},
            { spouse:"حمد بن حمد إدريس", children:[
              {name:"فاطمة حمد"},{name:"مصرية حمد"},{name:"عبد العزيز حمد"},{name:"منيرة حمد"},
              {name:"محمد حمد", late:true, note:"توفي شاباً"},{name:"عبد المجيد حمد"}
            ]}
          ]}
        ]}
      ]},

      { name:"عوض الله زمراوي", marriages:[
        { spouse:"عائشة (ابنة خالته جلة عثمان)", children:[
          { name:"شريفة عوض الله زمراوي", marriages:[{ children:[
            { name:"ست أبوها محمد إسماعيل", marriages:[
              { spouse:"أحمد عبدالله أحمد", children:[
                {name:"صديق أحمد عبدالله"},{name:"محمد أحمد عبدالله"}
              ]},
              { spouse:"أبو بكر إسماعيل عباش", children:[
                {name:"بحري أبوبكر إسماعيل"}
              ]}
            ]}
          ]}]}
        ]},
        { spouse:"مياسة كابقور", children:[
          { name:"محمد خير عوض الله", late:true },
          { name:"سعيدة عوض الله", marriages:[{ spouse:"أحمد الأسيوطي", children:[
            {name:"هدية أحمد"},{name:"محمد أحمد"},{name:"صالحة أحمد"}
          ]}]},
          { name:"سميرة عوض الله", marriages:[{ spouse:"عبد الفتاح آدم", children:[
            {name:"فاطمة عبد الفتاح"},{name:"عادل عبد الفتاح"},{name:"عرفة عبد الفتاح"},{name:"آدم عبد الفتاح"},
            {name:"رشدي عبد الفتاح"},{name:"محمد عبد الفتاح"},{name:"راشد عبد الفتاح"},{name:"رشا عبد الفتاح"}
          ]}]}
        ]},
        { spouse:"دوانة صالح خيري", children:[
          { name:"محمد عوض الله", marriages:[{ spouse:"أم سلمى كابقور", note:"المرحومة", children:[
            {name:"عوض الله"},{name:"زمراوي"},{name:"عبد العزيز"},{name:"عبد الرحمن"},{name:"عبير"},
            {name:"فاطمة"},{name:"فدوى"},{name:"سعيدة"},{name:"سارة"}
          ]}]},
          { name:"فاطمة عوض الله", marriages:[{ spouse:"أبوبكر حسن", children:[
            {name:"هيثم أبوبكر"},{name:"هبة أبوبكر"},{name:"سامي أبوبكر"},
            {name:"سيماوي أبوبكر"},{name:"وليد أبوبكر"},{name:"هالة أبوبكر"}
          ]}]}
        ]}
      ]},

      { name:"فاطمة زمراوي", note:"أمين ناس", marriages:[
        { spouse:"بلال بحري", children:[
          {name:"محمد بلال بحري"},{name:"سيد أحمد بلال بحري"}
        ]},
        { spouse:"محمد معروف", children:[
          {name:"كامل بسيلي"},{name:"زين العابدين بسيلي"},{name:"أحمد معروف"}
        ]}
      ]}

    ]}]},

    /* ===== جلة عثمان (ابنة) ===== */
    { name:"جلة عثمان", note:"ابنة الجدّ", marriages:[{ children:[
      {name:"ستنا"},{name:"عائشة"},{name:"جارة"},{name:"زينب"}
    ]}]}

  ]}]
};

/* ===== أدوات ===== */
const GEN = ['var(--g0)','var(--g1)','var(--g2)','var(--g3)','var(--g4)','var(--g5)'];
const GEN_LABEL = ['الجدّ','الأبناء','الأحفاد','أبناء الأحفاد','الجيل الخامس','الجيل السادس'];
const genColor = d => GEN[Math.min(d, GEN.length-1)];

function arNum(n){ return n.toLocaleString('ar-EG'); }

function countDesc(node){
  let n=0;
  (node.marriages||[]).forEach(m => (m.children||[]).forEach(c => { n += 1 + countDesc(c); }));
  return n;
}
function maxDepth(node, d=0){
  let m=d;
  (node.marriages||[]).forEach(mr => (mr.children||[]).forEach(c => { m = Math.max(m, maxDepth(c, d+1)); }));
  return m;
}

const allLis = [];

function makeCard(node, depth, lead){
  const card = document.createElement('div');
  card.className = 'card' + (lead ? ' lead' : '');
  card.style.setProperty('--accent', genColor(depth));

  const name = document.createElement('span');
  name.className = 'name'; name.textContent = node.name;
  card.appendChild(name);

  if(node.note){
    const nt = document.createElement('span');
    nt.className='note'; nt.textContent = '· '+node.note;
    card.appendChild(nt);
  }
  if(node.late){
    const p=document.createElement('span'); p.className='pill late'; p.textContent='رحمه الله';
    card.appendChild(p);
  }
  if(node.todo){
    const p=document.createElement('span'); p.className='pill todo'; p.textContent='بحاجة لتحديث';
    card.appendChild(p);
  }
  const cnt = countDesc(node);
  if(cnt>0){
    const b=document.createElement('span'); b.className='badge';
    b.style.setProperty('--accent', genColor(depth));
    b.textContent = arNum(cnt); card.appendChild(b);
  }
  return card;
}

function renderNode(node, depth, parentLi){
  const li = document.createElement('li');
  li.className = 'node';
  const hasKids = (node.marriages||[]).some(m => (m.children||[]).length);
  if(hasKids) li.classList.add('has-kids');

  const wrap = document.createElement('div');
  wrap.className = 'card-wrap';

  if(hasKids){
    const tg = document.createElement('button');
    tg.className='toggle'; tg.setAttribute('aria-label','فتح/طي الفرع');
    tg.innerHTML='<span class="car">▾</span>';
    tg.addEventListener('click', e=>{ e.stopPropagation(); toggle(li); });
    wrap.appendChild(tg);
  }else{
    const sp=document.createElement('span'); sp.className='toggle-spacer'; wrap.appendChild(sp);
  }

  const card = makeCard(node, depth, hasKids);
  if(hasKids) card.addEventListener('click', ()=> toggle(li));
  wrap.appendChild(card);
  li.appendChild(wrap);

  // searchable text
  const terms = [node.name, node.note||''];
  (node.marriages||[]).forEach(m=>{ if(m.spouse) terms.push(m.spouse); });
  li._card = card;
  li._parent = parentLi;
  li._search = normalize(terms.join(' '));
  li._hasKids = hasKids;
  allLis.push(li);

  if(hasKids){
    const branch = document.createElement('div');
    branch.className='branch';
    const multi = (node.marriages.filter(m=>(m.children||[]).length).length > 1);

    node.marriages.forEach(m=>{
      if(!(m.children||[]).length) return;
      if(m.spouse && (multi || depth>=1)){
        const mh=document.createElement('div'); mh.className='marriage-head';
        mh.innerHTML = '<span class="ring">⚭</span> زواج من ';
        const chip=document.createElement('span'); chip.className='spouse-chip'; chip.textContent=m.spouse;
        mh.appendChild(chip);
        if(m.note){ const s=document.createElement('span'); s.textContent='· '+m.note; s.style.color='var(--muted)'; mh.appendChild(s); }
        branch.appendChild(mh);
      }
      const ul=document.createElement('ul');
      ul.className='children' + (node.root?' root-level':'');
      ul.style.setProperty('--rail', genColor(depth+1));
      m.children.forEach(c=> ul.appendChild(renderNode(c, depth+1, li)));
      branch.appendChild(ul);
    });

    li._branch = branch;
    li.appendChild(branch);
  }
  return li;
}

function toggle(li, force){
  const want = (force===undefined) ? !li.classList.contains('collapsed') : !force;
  li.classList.toggle('collapsed', want);
  const tg = li.querySelector(':scope > .card-wrap > .toggle');
  if(tg) tg.setAttribute('aria-expanded', String(!want));
}

/* ===== build ===== */
const treeRoot = document.getElementById('tree');
const rootUl = document.createElement('ul');
rootUl.className='children root-level';
ROOT.marriages[0].children.forEach(c=> rootUl.appendChild(renderNode(c, 1, null)));
treeRoot.appendChild(rootUl);

/* default view: main branches visible, sub-branches collapsed */
function applyDefault(){
  allLis.forEach(li=>{
    li.style.display='';
    li._card.classList.remove('match');
    if(li._hasKids){
      const depth = depthOf(li);
      toggle(li, depth<1 ? true : false); // gen1 open, deeper collapsed
    }
  });
}
function depthOf(li){ let d=1,p=li; while(p._parent){ d++; p=p._parent; } return d; }

applyDefault();

/* ===== stats ===== */
document.getElementById('stPeople').textContent = arNum(countDesc(ROOT)+1);
document.getElementById('stGen').textContent = arNum(maxDepth(ROOT)+1);

/* ===== legend ===== */
const legend = document.getElementById('legend');
for(let i=0;i<=maxDepth(ROOT);i++){
  const s=document.createElement('span');
  s.innerHTML = '<span class="dot" style="background:'+genColor(i)+'"></span> '+GEN_LABEL[Math.min(i,GEN_LABEL.length-1)];
  legend.appendChild(s);
}
const lm=document.createElement('span'); lm.innerHTML='<span class="tag-mini" style="color:#7a5230">رحمه الله</span>'; legend.appendChild(lm);

/* ===== controls ===== */
document.getElementById('expandAll').onclick = ()=> allLis.forEach(li=>{ li.style.display=''; if(li._hasKids) toggle(li,true); });
document.getElementById('collapseAll').onclick = ()=> allLis.forEach(li=>{ li.style.display=''; if(li._hasKids) toggle(li,false); });

/* ===== search ===== */
function normalize(s){
  return (s||'')
    .replace(/[\u064B-\u0652\u0670]/g,'')
    .replace(/[إأآا]/g,'ا').replace(/ى/g,'ي')
    .replace(/ؤ/g,'و').replace(/ئ/g,'ي').replace(/ة/g,'ه')
    .replace(/\s+/g,' ').trim().toLowerCase();
}
const noRes = document.getElementById('noResults');
document.getElementById('search').addEventListener('input', e=>{
  const q = normalize(e.target.value);
  if(!q){ applyDefault(); noRes.style.display='none'; return; }
  const visible = new Set();
  let any=false;
  allLis.forEach(li=>{
    li._card.classList.remove('match');
    if(li._search.includes(q)){
      any=true; li._card.classList.add('match');
      let p=li; while(p){ visible.add(p); p=p._parent; }
    }
  });
  allLis.forEach(li=>{
    if(visible.has(li)){
      li.style.display='';
      if(li._hasKids) toggle(li,true);
    }else li.style.display='none';
  });
  noRes.style.display = any ? 'none' : 'block';
});
</script>
</body>
